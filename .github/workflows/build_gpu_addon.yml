name: Build GPU Addon Installer

on:
  workflow_dispatch:
    inputs:
      torch_version:
        description: "LibTorch version"
        required: true
        default: "2.9.1"
      cuda_version:
        description: "CUDA version (ex: 13.0)"
        required: true
        default: "13.0"

jobs:
  build-addon:
    runs-on: windows-latest

    strategy:
      matrix:
        config: [release, debug]

    steps:
      # -------------------------------------------------------------- Checkout
      - uses: actions/checkout@v4

      # -------------------------------------------------------------- Set versions
      - name: Set versions
        shell: bash
        run: |
          CUDA_INPUT="${{ github.event.inputs.cuda_version }}"
          CUDA_NUMBER="${CUDA_INPUT//./}"
          echo "TORCH_VERSION=${{ github.event.inputs.torch_version }}" >> $GITHUB_ENV
          echo "CUDA_VERSION=$CUDA_NUMBER" >> $GITHUB_ENV

      # -------------------------------------------------------------- Download libtorch
      - name: Download libtorch
        shell: bash
        run: |
          if [ "${{ matrix.config }}" = "debug" ]; then
            URL="https://download.pytorch.org/libtorch/cu${CUDA_VERSION}/libtorch-win-shared-with-deps-debug-${TORCH_VERSION}%2Bcu${CUDA_VERSION}.zip"
          else
            URL="https://download.pytorch.org/libtorch/cu${CUDA_VERSION}/libtorch-win-shared-with-deps-${TORCH_VERSION}%2Bcu${CUDA_VERSION}.zip"
          fi
          echo "Downloading $URL ..."
          curl -L "$URL" -o libtorch.zip

      # -------------------------------------------------------------- Extract DLLs
      - name: Extract DLLs
        shell: pwsh
        run: |
          $dlls = @(
            "torch_cuda.dll",
            "cupti64_2025.3.0.dll",
            "c10_cuda.dll",
            "cublas64_13.dll",
            "cublasLt64_13.dll",
            "cudnn64_9.dll",
            "cufft64_12.dll",
            "cusolver64_12.dll",
            "cusparse64_12.dll",
            "nvJitLink_130_0.dll"
          )

          $outdir = "dlls_${{ matrix.config }}"
          New-Item -ItemType Directory -Force -Path $outdir | Out-Null
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead("libtorch.zip")

          foreach ($entry in $zip.Entries) {
            $filename = [System.IO.Path]::GetFileName($entry.FullName)
            if ($dlls -contains $filename) {
              [System.IO.Compression.ZipFileExtensions]::ExtractToFile($entry, "$outdir\$filename", $true)
              Write-Host "Extracted: $filename"
            }
          }
          $zip.Dispose()

      # -------------------------------------------------------------- Compile installer (NSIS is preinstalled on windows-latest)
      - name: Compile installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path Output | Out-Null
          makensis /DVERSION="${{ env.TORCH_VERSION }}-cu${{ env.CUDA_VERSION }}" /DCONFIG=${{ matrix.config }} cuda_addon_setup.nsi

      # -------------------------------------------------------------- Upload artifact
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: cuda-addon-${{ matrix.config }}-${{ env.TORCH_VERSION }}-cu${{ env.CUDA_VERSION }}
          path: Output/cuda_addon_setup_${{ matrix.config }}.exe
          retention-days: 30