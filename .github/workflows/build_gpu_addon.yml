name: Build GPU Addon Installer

on:
  workflow_dispatch:
    inputs:
      torch_version:
        description: "LibTorch version"
        required: true
        default: "2.9.1"
      cuda_version:
        description: "CUDA version (ex: 13.0)"
        required: true
        default: "13.0"

jobs:
  build-addon:
    runs-on: windows-latest

    strategy:
      matrix:
        config: [release, debug]

    steps:
      # -------------------------------------------------------------- Checkout
      - uses: actions/checkout@v4

      # -------------------------------------------------------------- Set versions + convert CUDA
      - name: Set versions
        shell: bash
        run: |
          # Torch version
          echo "TORCH_VERSION=${{ github.event.inputs.torch_version }}" >> $GITHUB_ENV
          
          # Convert CUDA version: 13.0 -> 130
          CUDA_INPUT="${{ github.event.inputs.cuda_version }}"
          CUDA_NUMBER="${CUDA_INPUT//./}"
          echo "CUDA_VERSION=$CUDA_NUMBER" >> $GITHUB_ENV
          
          echo "Torch version: $TORCH_VERSION"
          echo "CUDA input: $CUDA_INPUT, converted: $CUDA_NUMBER"
          echo "Build config: ${{ matrix.config }}"

      # -------------------------------------------------------------- Download libtorch
      - name: Download libtorch
        shell: bash
        run: |
          if [ "${{ matrix.config }}" = "debug" ]; then
            URL="https://download.pytorch.org/libtorch/cu${CUDA_VERSION}/libtorch-win-shared-with-deps-debug-${TORCH_VERSION}%2Bcu${CUDA_VERSION}.zip"
            OUT="libtorch-debug.zip"
          else
            URL="https://download.pytorch.org/libtorch/cu${CUDA_VERSION}/libtorch-win-shared-with-deps-${TORCH_VERSION}%2Bcu${CUDA_VERSION}.zip"
            OUT="libtorch-release.zip"
          fi

          echo "Downloading $URL ..."
          curl -L "$URL" -o "$OUT"

      # -------------------------------------------------------------- Extract DLLs
      - name: Extract DLLs
        shell: pwsh
        run: |
          $dlls = @(
            "torch_cuda.dll",
            "cupti64_2025.3.0.dll",
            "c10_cuda.dll",
            "cublas64_13.dll",
            "cublasLt64_13.dll",
            "cudnn64_9.dll",
            "cufft64_12.dll",
            "cusolver64_12.dll",
            "cusparse64_12.dll",
            "nvJitLink_130_0.dll"
          )

          $config = "${{ matrix.config }}"
          $zipfile = "libtorch-$config.zip"
          $outdir = "dlls_$config"

          New-Item -ItemType Directory -Force -Path $outdir | Out-Null
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($zipfile)

          foreach ($entry in $zip.Entries) {
              $filename = [System.IO.Path]::GetFileName($entry.FullName)
              if ($dlls -contains $filename) {
                  $dest = "$outdir\$filename"
                  [System.IO.Compression.ZipFileExtensions]::ExtractToFile($entry, $dest, $true)
                  Write-Host "Extracted: $filename"
              }
          }
          $zip.Dispose()
      
      - name: Check dlls folder
        shell: pwsh
        run: |
          $config = "${{ matrix.config }}"
          Write-Host "Looking for: dlls_$config"
          Get-ChildItem "dlls_$config" -ErrorAction SilentlyContinue
          Get-ChildItem . | Select-Object Name

      # -------------------------------------------------------------- Compile installer
      - name: Compile installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.6
        with:
          path: cuda_addon_setup.iss
          options: >
            /DAppVersion="${{ env.TORCH_VERSION }}-cu${{ env.CUDA_VERSION }}"
            /DConfiguration=${{ matrix.config }}

      # -------------------------------------------------------------- Upload artifacts
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: cuda-addon-${{ matrix.config }}-torch${TORCH_VERSION}-cu${CUDA_VERSION}
          path: Output/*.exe
          retention-days: 30